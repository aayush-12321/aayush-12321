name: Update GitHub Stats

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch Stats Images
        run: |
          curl "https://github-readme-stats.vercel.app/api?username=aayush-12321&show_icons=true&theme=transparent&hide_border=true" -o github-stats.svg
          curl "https://github-readme-stats.vercel.app/api/top-langs/?username=aayush-12321&layout=compact&theme=transparent&hide_border=true" -o top-langs.svg

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add github-stats.svg top-langs.svg
          git commit -m "Update profile stats" || exit 0
          git push
