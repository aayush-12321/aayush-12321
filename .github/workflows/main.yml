name: Generate Stats Images

on:
  schedule:
    - cron: '0 */12 * * *' # Runs every 12 hours
  workflow_dispatch: # Allows manual run

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Generate Github Stats SVG
        uses: vn7n24fzkq/github-readme-stats-github-action@v1.0.0
        with:
          output_path: github-stats.svg
          github_token: ${{ secrets.GH_TOKEN }}
          # Parameters matching your original design
          username: aayush-12321
          show_icons: true
          theme: transparent
          hide_border: true

      - name: Generate Top Langs SVG
        uses: vn7n24fzkq/github-readme-stats-github-action@v1.0.0
        with:
          output_path: top-langs.svg
          github_token: ${{ secrets.GH_TOKEN }}
          # Parameters for your language card
          username: aayush-12321
          layout: compact
          theme: transparent
          hide_border: true
          count_private: true

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-stats.svg top-langs.svg
          git commit -m "Update GitHub statistics" || exit 0
          git push
